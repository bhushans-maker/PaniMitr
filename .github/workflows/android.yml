name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find Project Directory
        id: find_project
        run: |
          # This command finds the folder where package.json lives
          PROJECT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          
          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::FATAL: Could not find 'package.json'. This usually means you uploaded a .zip file instead of the actual project files. Please extract your ZIP and upload the contents."
            ls -R
            exit 1
          fi
          
          echo "Using directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npm install --no-package-lock

      - name: Build Web Assets
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK Setup
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npx cap sync android

      - name: Build APK File
        working-directory: ${{ steps.find_project.outputs.project_dir }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PaniMitr-App-APK
          path: "**/*.apk"
