name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find Project Directory
        id: find_project
        run: |
          # Finds the directory containing package.json
          PROJECT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Using directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npm install --no-package-lock

      - name: Build Web Assets
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: npx cap sync android

      - name: Build APK File
        working-directory: ${{ steps.find_project.outputs.project_dir }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Save APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: PaniMitr-App-APK
          path: "**/*.apk" # Searches for any .apk file created
